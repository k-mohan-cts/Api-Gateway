server:
  port: 8082

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      mvc: # Add the 'mvc' node here
        routes:
          - id: audit-route
            uri: lb://AUDITCOMPLIANCEMANAGEMENT
            predicates:
              - Path=/api/audits/**
          - id: compliance-route
            uri: lb://AUDITCOMPLIANCEMANAGEMENT
            predicates:
              - Path=/api/audits/**

            # This removes the first two parts (/api/audits)
            # so the Audit service only sees "/all"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework: TRACE
    org.springframework.http.server: TRACE